<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    fontconfig 2.17.2 以降の 48-guessfamily.conf のリグレッションにより、
    lang=ja を指定しても Noto Sans CJK KR (韓国語字形) が優先されてしまう
    既知の不具合の回避策。generic family の優先リスト先頭に、ラテン文字用
    フォント → 日本語版 CJK フォントの順で追加し、ラテン文字の表示には
    影響を与えずに CJK 文字だけ日本語字形へ強制する。
  -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <family>Noto Sans Mono CJK JP</family>
    </prefer>
  </alias>
</fontconfig>
