interface:
  display_name: "GitHub Development Flow"
  short_description: "Guide an issue-driven GitHub workflow using main plus linked worktrees and user-approved remote actions"
  default_prompt: "Use $github-development-flow to run an issue-driven GitHub development flow that keeps `main` as the only long-lived branch, uses linked worktrees under `~/tmp` for implementation, and requires user authorization before remote git or gh actions."
